# =============================================================================
# NeuroViz CI/CD Pipeline
# =============================================================================
# Triggers:
#   - Push to main (runs full pipeline; deploy fires on green test+build)
#   - Pull request to main (runs full pipeline; deploy skipped)
#   - Manual dispatch (supports `skip_e2e` for emergency deploys when the
#     E2E suite is red but a fix must ship)
#
# Job graph:
#
#   test  ─┐
#          ├──> deploy   (push to main or workflow_dispatch)
#   build ─┘
#    │
#    └──> e2e (advisory on main, blocking on PR; can be skipped via dispatch)
#
# Design rules baked in here:
#   1. E2E is BLOCKING on PRs (catch regressions pre-merge) but ADVISORY on
#      main (don't gate users on a flaky post-merge check).
#   2. `deploy` depends on `test` and `build` only — never on `e2e`. This is
#      how we avoid the "CI is broken so nothing ships" failure mode.
#   3. Every job runs `npm ci --prefer-offline` directly against
#      setup-node's built-in npm cache. No `node_modules`-as-artifact dance.
#   4. `e2e` has a hard `timeout-minutes: 15` so no single run can ever
#      burn the 6 h GitHub default again.
#   5. A `workflow_dispatch` with `skip_e2e` gives operators a one-click
#      force-deploy path for genuine emergencies.
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests (emergency deploy only — use when the E2E suite is broken but a fix must reach production)'
        type: boolean
        default: false

# Cancel in-progress runs for the same branch so pushes in quick succession
# don't waste CI minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions; individual jobs opt into more as needed.
permissions:
  contents: read

env:
  NODE_VERSION: '22'  # Node 22 LTS — matches release.yml, above semantic-release's ≥22 floor

jobs:
  # ===========================================================================
  # Job 1: Lint, Type Check, Unit Tests with Coverage
  # ===========================================================================
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      # Single coverage run — the previous pipeline ran `npm test` and then
      # `npm run test:coverage` back-to-back, doubling vitest wall-clock for
      # no benefit. Coverage executes the full suite on its own.
      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 3

  # ===========================================================================
  # Job 2: Build (production bundle)
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build application
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Analyze bundle size
        run: |
          {
            echo "## Bundle Size Report"
            echo '```'
            du -sh dist/* 2>/dev/null | sort -hr || echo "No dist files found"
            echo '```'
            if [ -d "dist" ]; then
              size=$(du -sm dist/ | cut -f1)
              echo ""
              echo "Total bundle size: ${size}MB (limit: 25MB)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -d "dist" ]; then
            size=$(du -sm dist/ | cut -f1)
            if [ "$size" -gt 25 ]; then
              echo "::error::Bundle size (${size}MB) exceeds limit (25MB)"
              exit 1
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ===========================================================================
  # Job 3: E2E Tests (Playwright against built production bundle)
  # ===========================================================================
  # Policy:
  #   - BLOCKING on pull requests (PR merges wait on green E2E).
  #   - ADVISORY on push to main (`continue-on-error` flips true), so a flaky
  #     post-merge E2E can't stop auto-deploy. Branch protection on the PR
  #     check is where regressions are actually caught.
  #   - SKIPPABLE via `workflow_dispatch` with `skip_e2e: true`, for the case
  #     where the E2E suite itself is broken and a fix must ship.
  # ===========================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_e2e) }}
    continue-on-error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install Playwright chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          # Serve the built bundle on the sub-path GitHub Pages uses.
          npm run preview -- --port 5173 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT

          # Wait for server — increased timeout because the install step
          # above sometimes finishes a beat before vite is ready.
          npx wait-on http://localhost:5173/NeuroViz/ --timeout 60000

          # Run Playwright (config picks CI settings from process.env.CI)
          npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always() && !cancelled()
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: tests/reports/
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces-${{ github.run_attempt }}
          path: tests/results/
          retention-days: 3
          if-no-files-found: ignore

  # ===========================================================================
  # Job 4: Deploy to GitHub Pages
  # ===========================================================================
  # Deploy runs when:
  #   - A push to main passes `test` + `build` (E2E intentionally not a gate).
  #   - A manual workflow_dispatch run passes `test` + `build`.
  # Deploy DOES NOT run on pull requests.
  # ===========================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, build]
    timeout-minutes: 5

    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: write   # For gh-pages branch push
      id-token: write   # Reserved for future Pages attestation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
          commit_message: 'deploy: ${{ github.sha }}'
